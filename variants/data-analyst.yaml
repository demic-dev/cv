work:
  - name: NERDS Lab @ ITU
    position: Research Intern
    url: https://nerds.itu.dk/
    location: Copenhagen, DK
    startDate: "2025-09"
    endDate: "2025-12"
    summary: >-
      Conducted bachelor's thesis research on measuring polarization in
      large-scale directed social networks during an Erasmus traineeship,
      including a literature review across social media analysis, network
      polarization, and network science. Stack: Python, NumPy, PyTorch, Pandas.
    highlights:
      - >-
        Measured and analyzed polarization across directed networks by applying
        the Magnetic Laplacian — the *first use in this context*
      - >-
        Statistically validated results against theoretical toy-network models,
        reaching a *0.65 average correlation*
      - >-
        Prepared and processed the *entire historical Reddit dataset* on HPC
        infrastructure, adapting the pipeline to build directed instead of
        undirected networks
      - >-
        Earned the *highest thesis grade (7/7)*. Read #link("https://raw.githubusercontent.com/demic-dev/bsc-thesis/refs/heads/main/thesis.pdf")[here]

  - name: Polyneta
    position: Co-founder
    url: https://polyneta.netlify.app/
    location: Remote
    startDate: "2025-04"
    endDate: "2025-12"
    summary: >-
      Co-founded a startup connecting companies that sell to municipalities to
      simplify direct-award procurement, running customer discovery and building
      the early product with AI-accelerated development.
    highlights:
      - >-
        Ran customer discovery through *3-5 exploratory interviews* and Mom Test
        surveys
      - >-
        Pitched at the FondazioneUniMi incubator, backed by extensive market
        research
      - >-
        Prototyped a scraping, RAG, and OCR pipeline to extract structured data
        from disorganized public-sector PDFs

  - name: Pane&Design (PED, part of humanvsmachine.co)
    position: Front-End Engineer
    url: https://humanvsmachine.co/
    location: Milan, IT
    startDate: "2021-10"
    endDate: "2022-12"
    summary: >-
      Built and optimized high-traffic e-commerce sites and internal
      telemedicine tools for a Fortune 500 client at a digital consulting
      agency, using React, TypeScript, styled-components, Tailwind, and
      Material UI.
    highlights:
      - >-
        Unified a multi-section medical history form into a single-page
        data-entry flow for the client's ophthalmologists, using
        react-jsonschema-form
      - >-
        Cut re-renders and load times by *perceived 50%* on a high-traffic
        e-commerce site (*~100k monthly visits*) via microservices with dynamic
        JS loading

  - name: Online Impresa (part of areaweb.org)
    position: Full-Stack Engineer
    url: https://areaweb.org/
    location: Bari, IT
    startDate: "2020-07"
    endDate: "2021-09"
    summary: >-
      Sole developer at a small software agency serving SMEs, building the
      company's flagship mobile app platform from scratch with TypeScript,
