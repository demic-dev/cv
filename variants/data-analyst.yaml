      requirements.
    highlights:
      - >-
        Built internal reporting tools, including a live office dashboard
        showing the *daily count of closed orders*, fed by a WhatsApp bot
        posting every closed order
      - >-
        Delivered *~100 client apps*, gathering and implementing requirements
        directly with clients

